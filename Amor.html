<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para mi Princesa</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-gradient: linear-gradient(to bottom, #1a2a6c 0%, #b21f1f 45%, #fdbb2d 100%);
            --grass-gradient: linear-gradient(to bottom, #388e3c, #1b5e20);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--sky-gradient);
            font-family: 'Segoe UI', sans-serif;
            /* Evita el scroll accidental en móviles */
            touch-action: none; 
        }

        /* --- NUBES --- */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            filter: blur(20px);
            animation: moveClouds linear infinite;
            z-index: 1;
        }

        @keyframes moveClouds {
            from { transform: translateX(-200px); }
            to { transform: translateX(110vw); }
        }

        /* --- EL SOL (Ajustado para móviles) --- */
        .sun {
            position: absolute;
            bottom: 35%;
            left: 50%;
            width: 120px; height: 120px; /* Un poco más pequeño para cel */
            background: #fff9c4;
            border-radius: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 50px #ffeb3b, 0 0 100px #ff9800;
            z-index: 2;
        }

        /* --- CONTENIDO DE TEXTO --- */
        .content {
            position: absolute;
            top: 15%; /* Más arriba en móviles para dar espacio */
            width: 100%;
            text-align: center;
            z-index: 10;
            padding: 0 10px;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: white;
            font-size: 2.2rem; /* Tamaño base para móvil */
            text-shadow: 2px 4px 10px rgba(0,0,0,0.6);
            margin: 0;
        }

        .phrase {
            color: white;
            font-size: 1.1rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
            margin-top: 10px;
        }

        /* --- STITCH --- */
        .stitch-space {
            position: absolute;
            bottom: 34%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            z-index: 6;
        }

        .stitch-img {
            width: 100%;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.4));
            animation: breathe 3s infinite ease-in-out;
        }

        /* --- PRADO --- */
        .meadow {
            position: absolute;
            bottom: 0;
            width: 100%; height: 40%;
            background: var(--grass-gradient);
            z-index: 5;
            box-shadow: inset 0 15px 30px rgba(0,0,0,0.4);
        }

        /* --- TULIPANES --- */
        .tulip {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom;
            animation: sway 4s infinite ease-in-out alternate;
        }

        .tulip-head {
            width: 18px; height: 26px; /* Más finos para móvil */
            border-radius: 10px 10px 4px 4px;
            position: relative;
        }

        .tulip-head::before, .tulip-head::after {
            content: ''; position: absolute;
            width: 10px; height: 22px;
            background: inherit; border-radius: 8px; top: 0;
        }
        .tulip-head::before { left: -5px; transform: rotate(-15deg); }
        .tulip-head::after { right: -5px; transform: rotate(15deg); }

        .stem { width: 2px; height: 35px; background: #2e7d32; }

        @keyframes sway { from { transform: rotate(-3deg); } to { transform: rotate(3deg); } }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* --- MEDIA QUERIES PARA PANTALLAS GRANDES (PC) --- */
        @media (min-width: 768px) {
            h1 { font-size: 4rem; }
            .phrase { font-size: 1.5rem; }
            .sun { width: 150px; height: 150px; }
            .stitch-space { width: 160px; }
            .tulip-head { width: 24px; height: 32px; }
            .stem { width: 3px; height: 50px; }
        }
    </style>
</head>
<body>

    <div class="cloud" style="width: 150px; height: 70px; top: 5%; animation-duration: 30s;"></div>
    <div class="cloud" style="width: 100px; height: 50px; top: 15%; left: 20%; animation-duration: 50s; opacity: 0.5;"></div>

    <div class="sun"></div>

    <div class="content">
        <h1>Entre mil jardines de tulipanes...</h1>
        <p class="phrase">siempre te elegiría a ti, te adoro con todo mi corazón!!💘</p>
    </div>

    <div class="stitch-space">
        <img src="Stitch.png" alt="Stitch" class="stitch-img">
    </div>

    <div class="meadow" id="garden"></div>

    <script>
        const garden = document.getElementById('garden');
        const colors = ['#ff85a2', '#c3a6ff'];

        function plantTulips() {
            // Bajamos a 30 tulipanes en móvil para que no sature el procesador del cel
            const count = window.innerWidth < 768 ? 30 : 45; 
            
            for (let i = 0; i < count; i++) {
                const tulip = document.createElement('div');
                tulip.className = 'tulip';
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const scale = (y / 100) + 0.4;
                
                tulip.style.left = `${x}%`;
                tulip.style.bottom = `${y}%`;
                tulip.style.zIndex = Math.floor(y);
                tulip.style.transform = `scale(${scale})`;
                tulip.style.animationDelay = `${Math.random() * 4}s`;

                tulip.innerHTML = `
                    <div class="tulip-head" style="background: ${colors[Math.floor(Math.random() * 2)]}"></div>
                    <div class="stem"></div>
                `;
                garden.appendChild(tulip);
            }
        }
        plantTulips();
    </script>
</body>
</html>
