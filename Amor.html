<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para mi Princesa</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-gradient: linear-gradient(to bottom, #1a2a6c 0%, #b21f1f 45%, #fdbb2d 100%);
            --grass-gradient: linear-gradient(to bottom, #388e3c, #1b5e20);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--sky-gradient);
            font-family: 'Segoe UI', sans-serif;
            touch-action: none; 
        }

        /* --- NUBES --- */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            filter: blur(20px);
            animation: moveClouds linear infinite;
            z-index: 1;
        }

        @keyframes moveClouds {
            from { transform: translateX(-200px); }
            to { transform: translateX(110vw); }
        }

        /* --- EL SOL --- */
        .sun {
            position: absolute;
            bottom: 35%;
            left: 50%;
            width: 120px; height: 120px;
            background: #fff9c4;
            border-radius: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 50px #ffeb3b, 0 0 100px #ff9800;
            z-index: 2;
        }

        /* --- TEXTO --- */
        .content {
            position: absolute;
            top: 10%; width: 100%;
            text-align: center;
            z-index: 10;
            padding: 0 10px;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: white; font-size: 2.2rem;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.6);
            margin: 0;
        }

        .phrase {
            color: white; font-size: 1.1rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
            margin-top: 10px;
        }

        /* --- STITCH INTERACTIVO --- */
        .stitch-space {
            position: absolute;
            bottom: 34%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            z-index: 15;
            cursor: pointer;
        }

        .stitch-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
        }

        .stitch-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.4));
            backface-visibility: hidden;
        }

        .stitch-front {
            transform: rotateY(180deg);
        }

        .active .stitch-wrapper {
            transform: rotateY(180deg) scale(1.1);
        }

        /* Mensaje Bubble */
        .message-bubble {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: white;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #d81b60;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 20;
            white-space: nowrap; /* Para que la frase no se corte */
            pointer-events: none;
        }

        .active .message-bubble {
            transform: translateX(-50%) scale(1);
            opacity: 1;
            top: -75px;
        }

        /* --- CORAZONES --- */
        .heart-pop {
            position: absolute;
            color: #ff4d6d;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 20;
            animation: heartFloat 1s forwards ease-out;
        }

        @keyframes heartFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
        }

        /* --- PRADO --- */
        .meadow {
            position: absolute;
            bottom: 0;
            width: 100%; height: 40%;
            background: var(--grass-gradient);
            z-index: 5;
            box-shadow: inset 0 15px 30px rgba(0,0,0,0.4);
        }

        /* --- TULIPANES --- */
        .tulip {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom;
            animation: sway 4s infinite ease-in-out alternate;
        }

        .tulip-head {
            width: 18px; height: 26px;
            border-radius: 10px 10px 4px 4px;
            position: relative;
        }

        .tulip-head::before, .tulip-head::after {
            content: ''; position: absolute;
            width: 10px; height: 22px;
            background: inherit; border-radius: 8px; top: 0;
        }
        .tulip-head::before { left: -5px; transform: rotate(-15deg); }
        .tulip-head::after { right: -5px; transform: rotate(15deg); }

        .stem { width: 2px; height: 35px; background: #2e7d32; }

        @keyframes sway { from { transform: rotate(-3deg); } to { transform: rotate(3deg); } }

        @media (min-width: 768px) {
            h1 { font-size: 3.5rem; }
            .sun { width: 150px; height: 150px; }
            .stitch-space { width: 160px; height: 160px; }
        }
    </style>
</head>
<body>

    <div class="cloud" style="width: 150px; height: 70px; top: 5%; animation-duration: 35s;"></div>
    <div class="sun"></div>

    <div class="content">
        <h1>Entre mil jardines de tulipanes...</h1>
        <p class="phrase">siempre te elegiría a ti, ¡Te amo!💘</p>
    </div>

    <div class="stitch-space" id="stitchClick">
        <div class="message-bubble" id="bubble">¡Hola princesa! 💖</div>
        <div class="stitch-wrapper">
            <img src="Stitch.png" alt="Stitch Espaldas" class="stitch-img stitch-back">
            <img src="Stitch-frente.png" alt="Stitch Frente" class="stitch-img stitch-front">
        </div>
    </div>

    <div class="meadow" id="garden"></div>

    <script>
        const garden = document.getElementById('garden');
        const stitchBtn = document.getElementById('stitchClick');
        const bubble = document.getElementById('bubble');
        const colors = ['#ff85a2', '#c3a6ff'];

        // --- LISTA DE FRASES ROMÁNTICAS ---
        const frases = [
            "¡Te amo muchísimo! 💖",
            "Eres lo más bonito que tengo ✨",
            "¿Ya te dije que te ves hermosa? 😍",
            "Eres mi persona favorita 💘",
            "¡Siempre estaré para ti! 🌹",
            "Mi Ohana eres tú 🥰",
            "Eres el amor de mi vida 💓",
            "Gracias por estar conmigo 😊",
            "¡Eres mi vida! 💎",
            "¡Te mando un besito! 💋"
        ];

        // Lógica de clic para voltear y cambiar mensaje
        stitchBtn.addEventListener('click', function() {
            const estaActivo = this.classList.toggle('active');
            
            // Solo cambiamos el mensaje cuando voltea hacia enfrente
            if(estaActivo) {
                // Elegimos una frase al azar del arreglo
                const fraseAzar = frases[Math.floor(Math.random() * frases.length)];
                bubble.innerText = fraseAzar;

                // Lanzamos corazones
                for(let i=0; i<6; i++) {
                    setTimeout(createHeart, i * 100);
                }
            }
        });

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart-pop';
            heart.innerHTML = '❤️';
            heart.style.left = (Math.random() * 60 + 20) + '%';
            stitchBtn.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }

        function plantTulips() {
            const count = window.innerWidth < 768 ? 30 : 45; 
            for (let i = 0; i < count; i++) {
                const tulip = document.createElement('div');
                tulip.className = 'tulip';
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const scale = (y / 100) + 0.4;
                tulip.style.left = `${x}%`;
                tulip.style.bottom = `${y}%`;
                tulip.style.zIndex = Math.floor(y);
                tulip.style.transform = `scale(${scale})`;
                tulip.innerHTML = `
                    <div class="tulip-head" style="background: ${colors[Math.floor(Math.random() * 2)]}"></div>
                    <div class="stem"></div>
                `;
                garden.appendChild(tulip);
            }
        }
        plantTulips();
    </script>
</body>
</html>
